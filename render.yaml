services:
  - type: worker
    name: stock-secretary-bot
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements-render.txt
    startCommand: ./start_render.sh
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
